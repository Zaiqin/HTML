<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Repo HTML Browser</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #search {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .file {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .file a {
      text-decoration: none;
      color: #0366d6;
      font-size: 18px;
    }

    .path {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>📂 HTML File Browser</h1>
  <input type="text" id="search" placeholder="Search HTML files..." />
  <div id="fileList"></div>

  <script>
    const username = "Zaiqin";
    const repo = "HTML";
    const branch = "main";

    let allFiles = [];

    async function fetchRepoTree() {
      const url = `https://api.github.com/repos/${username}/${repo}/git/trees/${branch}?recursive=1`;
      const res = await fetch(url);
      const data = await res.json();

      allFiles = data.tree.filter(file =>
        file.path.endsWith(".html")
      );

      renderFiles(allFiles);
    }

    function renderFiles(files) {
      const container = document.getElementById("fileList");
      container.innerHTML = "";

      files.forEach(file => {
        const div = document.createElement("div");
        div.className = "file";

        const link = document.createElement("a");
        link.href = file.path;
        link.textContent = file.path.split("/").pop();

        const path = document.createElement("div");
        path.className = "path";
        path.textContent = file.path;

        div.appendChild(link);
        div.appendChild(path);
        container.appendChild(div);
      });
    }

    document.getElementById("search").addEventListener("input", e => {
      const value = e.target.value.toLowerCase();

      const filtered = allFiles.filter(file =>
        file.path.toLowerCase().includes(value)
      );

      renderFiles(filtered);
    });

    fetchRepoTree();
  </script>
</body>
</html>
